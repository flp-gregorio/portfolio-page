<div class="min-h-screen bg-black text-white selection:bg-purple-500 selection:text-white pb-20 overflow-x-hidden font-sans">
  
    <section class="min-h-min py-32 flex flex-col justify-end relative px-6 md:px-12 pt-32 pb-20">
      <div class="max-w-full px-4">
        <h1 class="font-black text-9xl leading-none tracking-tighter animate-slide-up text-transparent" style="-webkit-text-stroke: 1px white;">
          PROJECTS
        </h1>
        <div class="mt-4 animate-slide-up delay-100 flex items-center gap-4">
             <div class="h-px w-24 bg-purple-500"></div>
             <p class="text-gray-400 font-light tracking-wide text-sm md:text-base">Selected works & experiments</p>
        </div>
      </div>
    </section>
  
    <div class="max-w-7xl mx-auto px-6 md:px-12">
      
      <app-section-layout sectionNumber="01" sectionTitle="FEATURED">
        <div class="flex flex-col gap-16 animate-slide-up delay-200">
            <app-featured-project-card *ngFor="let project of projects" [project]="project" (cardClick)="selectProject($event)"></app-featured-project-card>
        </div>
      </app-section-layout>
  
      <app-section-layout sectionNumber="02" sectionTitle="LAB & MODS">
        <div sidebar-extra>
            <a href="https://next.nexusmods.com/profile/Nevaty/mods" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 text-sm text-gray-400 hover:text-purple-500 transition-colors group/link mt-2">
                <span>View all on</span>
                <span class="text-white font-bold tracking-wider uppercase group-hover/link:text-purple-500 transition-colors">Nexus Mods</span>
                <span class="group-hover/link:translate-x-1 transition-transform">→</span>
            </a>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <app-minor-project-card *ngFor="let mProject of minorProjects" [project]="mProject" (cardClick)="selectProject($event)"></app-minor-project-card>
        </div>
      </app-section-layout>
  

    </div>
  
    <div *ngIf="selectedProject" class="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in" (click)="closeProject()">
        <div class="absolute inset-0 bg-black/95"></div>
        
        <div class="relative w-full max-w-4xl max-h-full overflow-y-auto bg-neutral-950 border border-white/10 shadow-2xl shadow-purple-900/20 animate-slide-up" (click)="$event.stopPropagation()">
            
            <button (click)="closeProject()" class="absolute top-6 right-6 z-20 p-2 bg-black/50 hover:bg-white text-white hover:text-black transition-colors border border-white/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
  
            <div class="grid grid-cols-1 md:grid-cols-2">
                <div class="h-64 md:h-auto bg-black relative border-b md:border-b-0 md:border-r border-white/10">
                    <img [src]="selectedProject.featuredUrl ? selectedProject.featuredUrl : selectedProject.logoUrl" class="w-full h-full object-cover opacity-80" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80"></div>
                </div>
                
                <div class="p-8 md:p-12 flex flex-col h-full">
                    <span class="text-purple-500 font-bold tracking-widest text-xs mb-2">PROJECT DETAILS</span>
                    <h2 class="text-4xl font-black mb-6 text-white leading-none">{{ selectedProject.name }}</h2>
                    
                    <div class="space-y-6 flex-grow">
                        <div>
                            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">About</h3>
                            <p class="text-gray-300 font-light leading-relaxed text-lg">
                                {{ selectedProject.description }}
                            </p>
                        </div>
            
                        <div>
                            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">Tech Stack</h3>
                            <div class="flex gap-3 flex-wrap">
                                <div *ngFor="let icon of selectedProject.icons" class="group/icon relative p-3 border border-white/10 bg-white/5 hover:border-purple-500 hover:text-purple-500 transition-colors" title="{{icon}}">
                                     <ng-icon [name]="icon" size="48"></ng-icon>
                                </div>
                            </div>
                        </div>
                    </div>
            
                    <div *ngIf="selectedProject.githubUrls && selectedProject.githubUrls.length > 0" class="mt-6 pt-6 border-t border-white/10 flex flex-col gap-3">
                        <a *ngFor="let link of selectedProject.githubUrls" [href]="link.url" target="_blank" rel="noopener noreferrer" class="w-full flex items-center justify-center gap-2 bg-white text-black px-4 py-4 font-bold hover:bg-purple-500 hover:text-white transition-all duration-300 tracking-wider text-sm">
                           <ng-icon name="boxGitLogo" size="1.2em"></ng-icon>
                           VIEW {{ link.name | uppercase }}
                        </a>
                   </div>
                </div>
            </div>
        </div>
    </div>
  </div>
