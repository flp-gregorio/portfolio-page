<section class="grid grid-cols-1 md:grid-cols-12 gap-12 py-12 md:py-32 border-t border-white/10">
  <div class="md:col-span-4 relative">
    <div class="sticky top-32">
      <span class="text-purple-500 font-bold tracking-widest text-xs mb-3 block">{{ sectionNumber }}</span>
      <h2 class="text-4xl font-black tracking-tighter mb-4">{{ sectionTitle }}</h2>
      <ng-content select="[sidebar-extra]"></ng-content>
    </div>
  </div>
  <div class="md:col-span-8 animate-slide-up delay-200">
    <ng-content></ng-content>
  </div>
</section>
