<div class="relative h-72 md:h-80 border border-white/10 hover:border-purple-500/80 transition-all duration-500 group overflow-hidden bg-neutral-950 cursor-pointer"
    (click)="handleCardClick($event)">
    <a *ngIf="project.link" [href]="project.link" target="_blank" rel="noopener noreferrer" class="absolute inset-0 z-20" (click)="$event.stopPropagation()"></a>

    <div class="absolute inset-0 z-0">
        <img [src]="project.logoUrl" class="w-full h-full object-cover opacity-60 group-hover:opacity-100 group-hover:scale-110 transition-all duration-700 ease-out" />
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/80 to-transparent group-hover:via-black/60 transition-colors duration-500"></div>
    </div>
    
    <div class="relative z-10 p-6 flex flex-col justify-end h-full pointer-events-none">
        <div class="transform translate-y-8 group-hover:translate-y-0 transition-transform duration-500 ease-out">
            <div class="flex justify-between items-start mb-3">
                <h3 class="font-black text-white md:text-xl leading-tight group-hover:text-purple-400 transition-colors drop-shadow-lg w-10/12 truncate">{{ project.name }}</h3>
                <span class="text-white/60 group-hover:text-purple-400 transition-colors transform group-hover:-translate-y-1 group-hover:translate-x-1 duration-300">↗</span>
            </div>
            
            <p class="text-sm text-gray-300 leading-relaxed line-clamp-2 md:line-clamp-3 mb-6 font-light opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-100 drop-shadow-md">
                {{ project.description }}
            </p>
            
            <div class="flex gap-3 pt-4 border-t border-white/20 opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-150">
                <ng-icon *ngFor="let icon of project.icons" [name]="icon" class="text-white/80 text-xl group-hover:text-white transition-colors filter drop-shadow"></ng-icon>
            </div>
        </div>
    </div>
</div>
